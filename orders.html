<!DOCTYPE html>
<html>
  <head>
    <title>Reservations</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!--Google Font-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!--Stylesheets-->
    <link rel="stylesheet" href="general.css">
    <link rel="stylesheet" href="seafundheader.css">
    <link rel="stylesheet" href="orders.css">
  </head>

  <body>
    <!--Header-->
    <div class="seafund-header">
      <div class="seafund-header-left-section">
        <a href="index.html" class="header-link">
          <img src="images/logo-1.png">
        </a>
      </div>

      <div class="seafund-header-middle-section">
      </div>

      <div class="seafund-header-right-section">
        <a class="orders-link header-link" href="orders.html">
          <div class="orders-text">Reservations</div>
        </a>

        <a class="cart-link header-link" href="reservation.html">
          <div class="cart-quantity js-cart-quantity"></div>
          <div class="cart-text">Cart</div>
        </a>
      </div>
    </div>

    <!--receipt-->
    <div class="main">
      <div class="page-title">Your Orders</div>

      <div class="orders-grid">
        <div class="order-container js-order-summary">

          <div class="order-header">
            <div class="order-header-left-section">
              <div class="order-date">
                <div class="order-header-label">Order Placed:</div>
                <div>April 26, 2025</div>
              </div>
              <div class="order-total">
                <div class="order-header-label">Total:</div>
                <div>₱250.00</div>
              </div>
            </div>

            <div class="order-header-right-section">
              <div class="order-header-label">Order ID:</div>
              <div>27cba69d-4c3d-4098-b42d-ac7fa62b7664</div>
            </div>
          </div>

          <div class="order-details-grid">
            <div class="product-image-container">
              <img src="images/crabbykeychain.jpg">
            </div>

            <div class="product-details">
              <div class="product-name">
                Crab Keychain
              </div>
              <div class="product-delivery-date">
                Pickup date: April 29, 2025
              </div>
              <div class="product-quantity">
                Quantity: 1
              </div>
              <button class="buy-again-button button-primary">
                <span class="buy-again-message">Buy it again</span>
              </button>
            </div>

            <!--i'll hide this thru css-->
            <div class="product-actions">
              <a href="tracking.html?orderId=123&productId=456">
                <button class="track-package-button button-secondary">
                  Track package
                </button>
              </a>
            </div>

            <div class="product-image-container">
              <img src="images/whalekeychain.jpg">
            </div>

            <div class="product-details">
              <div class="product-name">
                Orca Keychain
              </div>
              <div class="product-delivery-date">
                Pickup date: August 19
              </div>
              <div class="product-quantity">
                Quantity: 2
              </div>
              <button class="buy-again-button button-primary">
                <span class="buy-again-message">Buy it again</span>
              </button>
            </div>

            <!--i'll hide this thru css-->
            <div class="product-actions">
              <a href="tracking.html">
                <button class="track-package-button button-secondary">
                  Track package
                </button>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!--Javascript-->
    <script type="module" src="items/orders.js"></script>
  </body>
</html>
